# ─────────────────────────────────────────────
# Customer Churn Prediction – Configuration
# ─────────────────────────────────────────────

project:
  name: "Customer Churn Prediction"
  version: "1.0.0"
  author: "Your Name"

paths:
  raw_data: "data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv"
  processed_data: "data/processed/churn_processed.csv"
  models_dir: "models/"

data:
  target_column: "Churn"
  test_size: 0.2
  random_state: 42
  categorical_columns:
    - gender
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
  numerical_columns:
    - tenure
    - MonthlyCharges
    - TotalCharges
  drop_columns:
    - customerID

models:
  logistic_regression:
    max_iter: 1000
    C: 1.0
    random_state: 42
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
  xgboost:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    random_state: 42

mlflow:
  experiment_name: "churn-prediction"
  tracking_uri: "mlruns"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/best_model.pkl"
